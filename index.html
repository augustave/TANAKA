<meta charset="UTF-8">

<title>永井 · 田中 · 福田 · 石岡</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050505;font-family:'Inter',sans-serif}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%;cursor:crosshair}

/* Overlay UI */
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}

#title{
  position:absolute;top:32px;left:40px;
  color:rgba(255,255,255,0.5);
  font-weight:200;font-size:13px;letter-spacing:0.2em;
  text-transform:uppercase;
  transition:opacity 0.6s;
}
#title .jp{
  display:block;font-size:22px;letter-spacing:0.35em;
  color:rgba(255,255,255,0.7);
  margin-bottom:6px;font-weight:300;
}

#year-display{
  position:absolute;bottom:40px;left:50%;transform:translateX(-50%);
  font-size:120px;font-weight:200;
  color:rgba(255,255,255,0.04);
  letter-spacing:0.05em;
  transition:color 0.3s;
  user-select:none;
}

#designer-labels{
  position:absolute;bottom:40px;left:40px;
  display:flex;gap:28px;
}
#designer-labels .dl{
  font-size:10px;letter-spacing:0.15em;text-transform:uppercase;
  color:rgba(255,255,255,0.25);
  transition:color 0.3s, transform 0.3s;
  cursor:pointer;pointer-events:auto;
}
#designer-labels .dl:hover{color:rgba(255,255,255,0.7)}
#designer-labels .dl.active{color:rgba(255,255,255,0.8);transform:translateY(-2px)}
#designer-labels .dl .dot{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  margin-right:6px;vertical-align:middle;
  opacity:0.6;
}

#info{
  position:absolute;top:32px;right:40px;
  text-align:right;
  color:rgba(255,255,255,0.3);
  font-size:10px;letter-spacing:0.1em;
  line-height:1.8;
}

#tooltip{
  position:fixed;pointer-events:none;
  padding:12px 16px;
  background:rgba(8,8,8,0.92);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(16px);
  font-size:11px;color:#ccc;
  z-index:20;display:none;
  min-width:140px;
}
#tooltip .t-swatch{width:100%;height:40px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.06)}
#tooltip .t-hex{font-family:monospace;font-size:13px;color:#fff;letter-spacing:0.05em}
#tooltip .t-meta{margin-top:4px;color:rgba(255,255,255,0.4);font-size:10px;letter-spacing:0.08em}
#tooltip .t-symbol{margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06);font-size:10px;line-height:1.6;color:rgba(255,255,255,0.5);max-width:220px}
#tooltip .t-symbol .t-label{color:rgba(255,255,255,0.25);text-transform:uppercase;font-size:8px;letter-spacing:0.12em;margin-top:5px;display:block}
#tooltip .t-symbol .t-label:first-child{margin-top:0}
#tooltip .t-color-name{font-size:11px;color:rgba(255,255,255,0.65);letter-spacing:0.06em;margin-top:4px}

#hint{
  position:absolute;bottom:100px;left:50%;transform:translateX(-50%);
  font-size:10px;letter-spacing:0.15em;color:rgba(255,255,255,0.15);
  text-transform:uppercase;
  animation:fadeHint 4s ease-in-out forwards;
}
@keyframes fadeHint{0%,60%{opacity:1}100%{opacity:0}}

/* Mode toggle bar */
#mode-bar{
  position:fixed;top:32px;left:50%;transform:translateX(-50%);
  display:flex;gap:2px;z-index:15;
}
#mode-bar button{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.3);
  padding:6px 18px;font-family:'Inter',sans-serif;
  font-size:9px;letter-spacing:0.14em;text-transform:uppercase;
  cursor:pointer;transition:all 0.3s;
}
#mode-bar button:first-child{border-radius:3px 0 0 3px}
#mode-bar button:last-child{border-radius:0 3px 3px 0}
#mode-bar button.active{
  background:rgba(255,255,255,0.08);
  border-color:rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.8);
}
#mode-bar button:hover{color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.15)}

/* Graph tooltip */
#graph-tooltip{
  position:fixed;pointer-events:none;
  padding:10px 14px;
  background:rgba(8,8,8,0.94);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(16px);
  font-size:10px;color:rgba(255,255,255,0.7);
  z-index:25;display:none;
  max-width:250px;line-height:1.6;
  letter-spacing:0.04em;
}
#graph-tooltip .gt-title{font-size:12px;color:#fff;font-weight:400;letter-spacing:0.06em}
#graph-tooltip .gt-type{color:rgba(255,255,255,0.3);font-size:9px;text-transform:uppercase;letter-spacing:0.12em;margin-top:2px}
#graph-tooltip .gt-context{margin-top:6px;color:rgba(255,255,255,0.5)}
</style>
</head>

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
    h *= 360;
  }
  return [h, s, l];
}

function classifyColor(rgb) {
  const [h, s, l] = rgbToHsl(rgb[0], rgb[1], rgb[2]);
  const colorName = s < 0.08 ? (l < 0.1 ? 'Near-Black' : l > 0.75 ? 'White' : 'Gray') :
    h < 15 ? 'Red' : h < 40 ? (l < 0.45 ? 'Brown' : 'Orange') :
    h < 65 ? 'Yellow' : h < 80 ? 'Yellow-Green' :
    h < 170 ? 'Green' : h < 200 ? 'Cyan' :
    h < 260 ? 'Blue' : h < 310 ? 'Purple' : 'Red';

  for (const sym of SYMBOLISM) {
    const hueMatch = h >= sym.hueRange[0] && h <= sym.hueRange[1];
    const satMatch = (sym.satMin === undefined || s >= sym.satMin) && (sym.satMax === undefined || s <= sym.satMax);
    const lumMatch = l >= sym.lumRange[0] && l <= sym.lumRange[1];
    if (hueMatch && satMatch && lumMatch) return { name: colorName, ...sym };
  }
  return { name: colorName, symbols: [], psych: '', cultures: [] };
}

class Particle {
  constructor(entry, index, totalInDesigner) {
    this.entry = entry;
    this.designer = entry.designer;
    this.hex = entry.hex;
    this.rgb = entry.rgb;
    this.year = entry.approx_year;
    this.weight = Math.max(entry.height_px, 4);

    // Home position (orbital layout)
    const d = DESIGNERS[this.designer];
    const designerAngle = (d.idx / 4) * Math.PI * 2 - Math.PI / 2;
    const orbitR = Math.min(W, H) * 0.28;
    const cx = W / 2 + Math.cos(designerAngle) * orbitR;
    const cy = H / 2 + Math.sin(designerAngle) * orbitR;

    // Spread within designer cluster by year
    const yearNorm = (this.year - 1960) / 33;
    const spiralAngle = yearNorm * Math.PI * 6 + index * 0.4;
    const spiralR = yearNorm * orbitR * 0.55 + 10;

    this.homeX = cx + Math.cos(spiralAngle) * spiralR;
    this.homeY = cy + Math.sin(spiralAngle) * spiralR;

    // Timeline position
    const timeX = 80 + yearNorm * (W - 160);
    const bandHeight = H * 0.12;
    const bandY = H * 0.3 + d.idx * bandHeight * 1.4;
    this.timeX = timeX;
    this.timeY = bandY + (index / totalInDesigner) * bandHeight - bandHeight / 2;

    // Current position
    this.x = W / 2 + (Math.random() - 0.5) * W * 1.5;
    this.y = H / 2 + (Math.random() - 0.5) * H * 1.5;
    this.targetX = this.homeX;
    this.targetY = this.homeY;
    this.vx = 0;
    this.vy = 0;

    this.baseSize = Math.sqrt(this.weight) * 2.5;
    this.size = this.baseSize;
    this.alpha = 0;
    this.targetAlpha = 0.85;
    this.glowAlpha = 0;
    this.hover = false;

    // Physics
    this.phase = Math.random() * Math.PI * 2;
    this.breathSpeed = 0.3 + Math.random() * 0.4;
    this.driftAmp = 1.5 + Math.random() * 2;
  }

  setMode(mode) {
    if (mode === 'orbital') {
      this.targetX = this.homeX;
      this.targetY = this.homeY;
    } else if (mode === 'timeline') {
      this.targetX = this.timeX;
      this.targetY = this.timeY;
    }
  }

  update(t, mx, my, mouseActive) {
    // Breathing
    this.phase += this.breathSpeed * 0.016;
    const breath = Math.sin(this.phase) * this.driftAmp;

    // Spring to target
    const dx = (this.targetX + breath) - this.x;
    const dy = (this.targetY + breath * 0.6) - this.y;
    this.vx += dx * 0.04;
    this.vy += dy * 0.04;
    this.vx *= 0.88;
    this.vy *= 0.88;

    // Mouse interaction
    if (mouseActive) {
      const mdx = this.x - mx;
      const mdy = this.y - my;
      const md = Math.sqrt(mdx * mdx + mdy * mdy);
      const influence = 120;
      if (md < influence) {
        const force = (1 - md / influence) * 3;
        this.vx += mdx / md * force;
        this.vy += mdy / md * force;
        this.glowAlpha = Math.max(this.glowAlpha, (1 - md / influence) * 0.5);
      }
    }

    this.x += this.vx;
    this.y += this.vy;

    // Alpha fade in
    this.alpha += (this.targetAlpha - this.alpha) * 0.05;
    this.glowAlpha *= 0.94;

    // Hover size
    this.size += ((this.hover ? this.baseSize * 2.5 : this.baseSize) - this.size) * 0.15;
  }

  draw(ctx) {
    // Glow
    if (this.glowAlpha > 0.01) {
      const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 5);
      grad.addColorStop(0, `rgba(${this.rgb[0]},${this.rgb[1]},${this.rgb[2]},${this.glowAlpha * 0.4})`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(this.x - this.size * 5, this.y - this.size * 5, this.size * 10, this.size * 10);
    }

    // Core
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = this.hex;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();

    // Inner highlight
    if (this.size > 4) {
      const [r, g, b] = this.rgb;
      const lum = (r + g + b) / 3;
      if (lum < 40) {
        // Dark colors get a subtle ring
        ctx.strokeStyle = `rgba(255,255,255,${0.08 * this.alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }

    ctx.globalAlpha = 1;
  }
}

function resetGraphPositions() {

function simGraph() {
  // Force simulation step
  const k = 0.005; // attraction
  const repulsion = 3000;
  const damping = 0.82;
  const centerPull = 0.008;

  // Repulsion between all nodes
  for (let i = 0; i < gNodes.length; i++) {
    for (let j = i+1; j < gNodes.length; j++) {
      const a = gNodes[i], b = gNodes[j];
      let dx = a.x - b.x, dy = a.y - b.y;
      let d2 = dx*dx + dy*dy;
      if (d2 < 1) d2 = 1;
      const f = repulsion / d2;
      const fx = dx / Math.sqrt(d2) * f;
      const fy = dy / Math.sqrt(d2) * f;
      a.vx += fx; a.vy += fy;
      b.vx -= fx; b.vy -= fy;
    }
  }

  // Edge attraction
  gEdges.forEach(e => {
    const dx = e.target.x - e.source.x;
    const dy = e.target.y - e.source.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    const ideal = 90;
    const f = (d - ideal) * k;
    const fx = dx/d * f, fy = dy/d * f;
    e.source.vx += fx; e.source.vy += fy;
    e.target.vx -= fx; e.target.vy -= fy;
  });

  // Center gravity
  gNodes.forEach(n => {
    n.vx += (W/2 - n.x) * centerPull;
    n.vy += (H/2 - n.y) * centerPull;
    n.vx *= damping;
    n.vy *= damping;
    n.x += n.vx;
    n.y += n.vy;
    // Bounds
    n.x = Math.max(80, Math.min(W-80, n.x));
    n.y = Math.max(80, Math.min(H-80, n.y));
  });
}

function drawGraph() {
  // Edges
  gEdges.forEach(e => {
    const hoverEdge = e.source.hover || e.target.hover;
    ctx.strokeStyle = hoverEdge ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.06)';
    ctx.lineWidth = hoverEdge ? 1.2 : 0.6;
    ctx.beginPath();
    ctx.moveTo(e.source.x, e.source.y);
    ctx.lineTo(e.target.x, e.target.y);
    ctx.stroke();

    // Edge label
    if (hoverEdge) {
      const mx = (e.source.x + e.target.x) / 2;
      const my = (e.source.y + e.target.y) / 2;
      ctx.font = '8px Inter, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.textAlign = 'center';
      ctx.fillText(e.label, mx, my - 4);
    }
  });

  // Group halos
  const groups = {};
  gNodes.forEach(n => {
    if (!groups[n.group]) groups[n.group] = [];
    groups[n.group].push(n);
  });
  Object.keys(groups).forEach(g => {
    const nodes = groups[g];
    let cx = 0, cy = 0;
    nodes.forEach(n => { cx += n.x; cy += n.y; });
    cx /= nodes.length; cy /= nodes.length;
    let maxR = 0;
    nodes.forEach(n => { maxR = Math.max(maxR, Math.hypot(n.x-cx, n.y-cy)); });
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR + 60);
    grad.addColorStop(0, GROUP_COLORS[g] || 'rgba(255,255,255,0.05)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, maxR + 60, 0, Math.PI * 2);
    ctx.fill();
  });

  // Nodes
  gNodes.forEach(n => {
    const r = n.hover ? n.radius * 1.5 : n.radius;

    // Glow on hover
    if (n.hover) {
      const glow = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r * 3);
      glow.addColorStop(0, n.color + '40');
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(n.x, n.y, r * 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Core circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = n.hover ? n.color : n.color + '99';
    ctx.fill();
    ctx.strokeStyle = n.hover ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.08)';
    ctx.lineWidth = n.hover ? 1.5 : 0.5;
    ctx.stroke();

    // Label
    ctx.font = n.hover ? '11px Inter, sans-serif' : '9px Inter, sans-serif';
    ctx.fillStyle = n.hover ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.45)';
    ctx.textAlign = 'center';
    ctx.fillText(n.label, n.x, n.y + r + 14);
  });

  // Group labels
  ctx.font = '10px Inter, sans-serif';
  ctx.textAlign = 'center';
  const groupLabels = { tech:'PRODUCTION & TECH', art:'ARTISTIC APPLICATION', ling:'LINGUISTIC THEORY', culture:'SOCIOCULTURAL IDENTITY', theory:'COLOR THEORY' };
  Object.keys(groups).forEach(g => {
    const nodes = groups[g];
    let cx = 0, cy = 0;
    nodes.forEach(n => { cx += n.x; cy += n.y; });
    cx /= nodes.length; cy /= nodes.length;
    let minY = Infinity;
    nodes.forEach(n => { minY = Math.min(minY, n.y); });
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.letterSpacing = '2px';
    ctx.fillText(groupLabels[g] || g, cx, minY - 30);
  });
}

// ─── Mode ───
let mode = 'orbital';
let frozen = false;
const graphTooltip = document.getElementById('graph-tooltip');

// Mode bar buttons
let lastModeBarClick = 0;
document.querySelectorAll('#mode-bar button').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    lastModeBarClick = Date.now();
    document.querySelectorAll('#mode-bar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const newMode = btn.dataset.mode;
    if (newMode !== mode) {
      mode = newMode;
      recalcPositions();
      particles.forEach(p => p.setMode(mode));
      if (mode === 'network') {
        resetGraphPositions();
        particles.forEach(p => { p.targetAlpha = 0.04; });
      } else if (activeDesigner) {
        particles.forEach(p => {
          p.targetAlpha = p.designer === activeDesigner ? 0.95 : 0.08;
        });
      } else {
        particles.forEach(p => { p.targetAlpha = 0.85; });
      }
    }
  });
});

canvas.addEventListener('click', (e) => {
  // Don't toggle if mode bar was just clicked or in network mode
  if (Date.now() - lastModeBarClick < 300) return;
  if (mode === 'network') return;
  if (mode === 'orbital') {
    mode = 'timeline';
    document.querySelectorAll('#mode-bar button').forEach(b => b.classList.remove('active'));
    document.querySelector('#mode-bar button[data-mode="timeline"]').classList.add('active');
    recalcPositions();
    particles.forEach(p => p.setMode(mode));
  } else if (mode === 'timeline') {
    mode = 'orbital';
    document.querySelectorAll('#mode-bar button').forEach(b => b.classList.remove('active'));
    document.querySelector('#mode-bar button[data-mode="orbital"]').classList.add('active');
    recalcPositions();
    particles.forEach(p => p.setMode(mode));
  }
});

function recalcPositions() {
  // Recalc home positions for current window size
  Object.keys(byDesigner).forEach(dKey => {
    const d = DESIGNERS[dKey];
    const designerAngle = (d.idx / 4) * Math.PI * 2 - Math.PI / 2;
    const orbitR = Math.min(W, H) * 0.28;
    const cx = W / 2 + Math.cos(designerAngle) * orbitR;
    const cy = H / 2 + Math.sin(designerAngle) * orbitR;
    const entries = byDesigner[dKey];
    const bandHeight = H * 0.12;
    const bandY = H * 0.3 + d.idx * bandHeight * 1.4;

    entries.forEach((e, i) => {
      const p = particles.find(pp => pp.entry === e);
      if (!p) return;
      const yearNorm = (p.year - 1960) / 33;
      const spiralAngle = yearNorm * Math.PI * 6 + i * 0.4;
      const spiralR = yearNorm * orbitR * 0.55 + 10;
      p.homeX = cx + Math.cos(spiralAngle) * spiralR;
      p.homeY = cy + Math.sin(spiralAngle) * spiralR;
      p.timeX = 80 + yearNorm * (W - 160);
      p.timeY = bandY + (i / entries.length) * bandHeight - bandHeight / 2;
    });
  });
}

window.addEventListener('resize', () => {
  recalcPositions();
  particles.forEach(p => p.setMode(mode));
});

// ─── Mouse ───
let mx = -1000, my = -1000, mouseActive = false;
const tooltip = document.getElementById('tooltip');
const yearDisplay = document.getElementById('year-display');

canvas.addEventListener('mousemove', e => {
  mx = e.clientX;
  my = e.clientY;
  mouseActive = true;

  // Graph node hover in network mode
  if (mode === 'network') {
    gNodes.forEach(n => { n.hover = false; });
    let closestNode = null, cnDist = Infinity;
    gNodes.forEach(n => {
      const d = Math.hypot(n.x - mx, n.y - my);
      if (d < cnDist) { cnDist = d; closestNode = n; }
    });
    if (closestNode && cnDist < closestNode.radius * 2.5) {
      closestNode.hover = true;
      graphTooltip.style.display = 'block';
      graphTooltip.querySelector('.gt-title').textContent = closestNode.label;
      graphTooltip.querySelector('.gt-type').textContent = closestNode.type;
      graphTooltip.querySelector('.gt-context').textContent = closestNode.sub;
      let gx = mx + 18, gy = my + 18;
      if (gx + 260 > W) gx = mx - 270;
      if (gy + 80 > H) gy = my - 90;
      graphTooltip.style.left = gx + 'px';
      graphTooltip.style.top = gy + 'px';
    } else {
      graphTooltip.style.display = 'none';
    }
    tooltip.style.display = 'none';
    return;
  }
  graphTooltip.style.display = 'none';

  // Find closest particle
  let closest = null, closestDist = Infinity;
  particles.forEach(p => {
    const d = Math.hypot(p.x - mx, p.y - my);
    if (d < closestDist) { closestDist = d; closest = p; }
  });

  particles.forEach(p => { p.hover = false; });

  if (closest && closestDist < 40) {
    closest.hover = true;
    tooltip.style.display = 'block';
    tooltip.querySelector('.t-swatch').style.background = closest.hex;
    tooltip.querySelector('.t-hex').textContent = closest.hex.toUpperCase();
    tooltip.querySelector('.t-color-name').textContent = '';
    tooltip.querySelector('.t-meta').textContent =
      `${DESIGNERS[closest.designer].jp} ${DESIGNERS[closest.designer].en} — ${closest.year}`;

    // Symbolism
    const sym = classifyColor(closest.rgb);
    const symEl = tooltip.querySelector('.t-symbol');
    tooltip.querySelector('.t-color-name').textContent = sym.name;
    if (sym.symbols && sym.symbols.length) {
      let html = '<span class="t-label">Symbolism</span>';
      html += sym.symbols.join(' · ');
      if (sym.psych) {
        html += '<span class="t-label">Psychology</span>';
        html += sym.psych;
      }
      if (sym.cultures && sym.cultures.length) {
        html += '<span class="t-label">Cultures</span>';
        html += sym.cultures.join(', ');
      }
      symEl.innerHTML = html;
      symEl.style.display = 'block';
    } else {
      symEl.style.display = 'none';
    }

    let tx = mx + 20, ty = my + 20;
    if (tx + 240 > W) tx = mx - 260;
    if (ty + 200 > H) ty = my - 220;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';

    yearDisplay.textContent = closest.year;
    yearDisplay.style.color = `rgba(255,255,255,0.06)`;
  } else {
    tooltip.style.display = 'none';
    yearDisplay.style.color = 'rgba(255,255,255,0.03)';
  }
});

canvas.addEventListener('mouseleave', () => {
  mouseActive = false;
  tooltip.style.display = 'none';
  particles.forEach(p => { p.hover = false; });
});

// ─── Connection lines between nearby same-designer particles ───
function drawConnections() {
  ctx.lineWidth = 0.4;
  for (let i = 0; i < particles.length; i++) {
    const a = particles[i];
    if (a.alpha < 0.2) continue;
    for (let j = i + 1; j < particles.length; j++) {
      const b = particles[j];
      if (a.designer !== b.designer) continue;
      if (b.alpha < 0.2) continue;
      const d = Math.hypot(a.x - b.x, a.y - b.y);
      const maxD = 60;
      if (d < maxD) {
        const opacity = (1 - d / maxD) * 0.12 * Math.min(a.alpha, b.alpha);
        ctx.strokeStyle = `rgba(255,255,255,${opacity})`;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }
  }
}

// ─── Timeline decorations ───
function drawTimelineDecor() {
  if (mode !== 'timeline') return;
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 0.5;
  ctx.font = '10px Inter, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.textAlign = 'center';

  for (let yr = 1960; yr <= 1993; yr += 5) {
    const x = 80 + ((yr - 1960) / 33) * (W - 160);
    ctx.beginPath();
    ctx.moveTo(x, H * 0.15);
    ctx.lineTo(x, H * 0.85);
    ctx.stroke();
    ctx.fillText(yr, x, H * 0.13);
  }

  // Designer labels on left
  ctx.textAlign = 'right';
  ctx.globalAlpha = 0.3;
  Object.keys(DESIGNERS).forEach(key => {
    const d = DESIGNERS[key];
    const bandHeight = H * 0.12;
    const bandY = H * 0.3 + d.idx * bandHeight * 1.4;
    ctx.fillText(`${d.jp}  ${d.en.toUpperCase()}`, 70, bandY + 4);
  });

  ctx.restore();
}

// ─── Render Loop ───
let t = 0;
function frame() {
  t += 0.016;
  ctx.clearRect(0, 0, W, H);

  // Subtle radial vignette
  const vignette = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
  vignette.addColorStop(0, 'rgba(5,5,5,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  if (mode !== 'network') {
    drawTimelineDecor();
  }

  // Update & draw particles (always, but dimmed in network mode)
  particles.forEach(p => p.update(t, mx, my, mode !== 'network' && mouseActive));
  if (mode !== 'network') {
    drawConnections();
  }

  // Sort by size for depth (smaller behind)
  const sorted = [...particles].sort((a, b) => a.size - b.size);
  sorted.forEach(p => p.draw(ctx));

  // Graph in network mode
  if (mode === 'network') {
    simGraph();
    drawGraph();
  }

  requestAnimationFrame(frame);
}

frame();
</script>
